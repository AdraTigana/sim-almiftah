<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Offline - Al-Miftah MIS</title>
    <meta name="theme-color" content="#006948"/>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: #f8f9fb;
            color: #191c1e;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100dvh;
            padding: 24px;
            text-align: center;
        }
        .icon {
            width: 96px;
            height: 96px;
            background: rgba(0, 105, 72, 0.1);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 24px;
        }
        .icon svg { width: 48px; height: 48px; fill: #006948; }
        h1 { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
        p { font-size: 14px; color: #6d7a72; line-height: 1.6; max-width: 320px; margin-bottom: 24px; }
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 28px;
            background: #006948;
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn:hover { background: #00855d; }
        .btn:active { transform: scale(0.97); }
        .btn svg { width: 18px; height: 18px; fill: white; }
        .footer { margin-top: 48px; font-size: 11px; color: #bccac0; }
    </style>
</head>
<body>
    <div class="icon">
        <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
    </div>
    <h1>Tidak Ada Koneksi Internet</h1>
    <p>Anda sedang offline. Data nilai yang sudah diisi akan tersimpan secara lokal dan otomatis tersinkronisasi saat koneksi kembali.</p>
    <button class="btn" onclick="retry()">
        <svg viewBox="0 0 24 24"><path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
        Coba Lagi
    </button>
    <p class="footer">&copy; 2026 Pondok Pesantren MTI Canduang</p>
    <script>
        function retry() {
            document.querySelector('.btn').disabled = true;
            document.querySelector('.btn').textContent = 'Mencoba...';
            setTimeout(function() { window.location.reload(); }, 1500);
        }
        window.addEventListener('online', function() { window.location.reload(); });
    </script>
</body>
</html>
